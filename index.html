<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI Ku</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d0d0d;
  --s1:#161616;
  --s2:#1e1e1e;
  --border:#2a2a2a;
  --accent:#7c3aed;
  --accent2:#a855f7;
  --text:#e8e8e8;
  --muted:#666;
  --user:#2563eb;
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden}

/* layout */
.app{display:flex;flex-direction:column;height:100dvh;max-width:600px;margin:0 auto}

/* header */
.header{
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  background:rgba(13,13,13,.95);
  backdrop-filter:blur(12px);
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;
  position:sticky;top:0;z-index:10;
}
.header-av{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:16px;color:#fff;
  box-shadow:0 0 16px rgba(124,58,237,.4);
}
.header-info{flex:1}
.header-name{font-weight:600;font-size:15px;color:#fff}
.header-status{font-size:11px;color:#22c55e;display:flex;align-items:center;gap:5px;margin-top:2px}
.status-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;box-shadow:0 0 5px #22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.clear-btn{
  background:none;border:1px solid var(--border);border-radius:8px;
  color:var(--muted);padding:6px 12px;font-size:12px;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;
}
.clear-btn:hover{border-color:#ef4444;color:#ef4444}

/* messages */
#msgs{
  flex:1;overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;
}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

.msg{display:flex;gap:10px;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse}

.av{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;margin-top:2px;
}
.av.ai{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 0 10px rgba(124,58,237,.3)}
.av.user{background:var(--s2);color:var(--muted);border:1px solid var(--border)}

.bubble{
  max-width:80%;padding:12px 15px;border-radius:18px;
  font-size:14px;line-height:1.7;
}
.bubble.ai{
  background:var(--s1);border:1px solid var(--border);
  border-bottom-left-radius:5px;color:var(--text);
}
.bubble.user{
  background:var(--user);color:#fff;
  border-bottom-right-radius:5px;
  box-shadow:0 4px 16px rgba(37,99,235,.25);
}

/* markdown */
.bubble.ai p{margin-bottom:8px}.bubble.ai p:last-child{margin-bottom:0}
.bubble.ai code{background:#0a0a0a;border:1px solid var(--border);padding:2px 6px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#a855f7}
.bubble.ai pre{background:#0a0a0a;border:1px solid var(--border);border-radius:10px;padding:12px 14px;overflow-x:auto;margin:8px 0}
.bubble.ai pre code{background:none;border:none;padding:0;color:#e8e8e8;font-size:13px}
.bubble.ai strong{color:#fff;font-weight:600}
.bubble.ai ul,.bubble.ai ol{padding-left:18px;margin:8px 0}
.bubble.ai li{margin-bottom:4px}

/* typing */
.typing-wrap{display:flex;align-items:center;gap:5px;padding:4px 0}
.typing-wrap span{width:6px;height:6px;background:var(--accent2);border-radius:50%;animation:bounce 1.2s infinite ease-in-out}
.typing-wrap span:nth-child(2){animation-delay:.2s}
.typing-wrap span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* input */
.input-wrap{
  padding:12px 16px 20px;background:var(--bg);
  border-top:1px solid var(--border);flex-shrink:0;
}
.input-inner{
  display:flex;align-items:flex-end;gap:10px;
  background:var(--s1);border:1.5px solid var(--border);
  border-radius:16px;padding:10px 12px;
  transition:border-color .2s;
}
.input-inner:focus-within{border-color:var(--accent)}
textarea{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;
  font-size:14px;resize:none;min-height:22px;max-height:120px;
  line-height:1.6;
}
textarea::placeholder{color:var(--muted)}
.send-btn{
  width:36px;height:36px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;
  box-shadow:0 4px 12px rgba(124,58,237,.35);
}
.send-btn:hover{transform:scale(1.06);box-shadow:0 6px 18px rgba(124,58,237,.5)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.send-btn svg{width:15px;height:15px}

/* empty */
.empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  color:var(--muted);text-align:center;padding:32px;
}
.empty-icon{font-size:40px;margin-bottom:4px}
.empty-title{font-size:16px;font-weight:600;color:var(--text)}
.empty-sub{font-size:13px;line-height:1.5}

@media(max-width:480px){
  .bubble{max-width:90%}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-av" id="headerAv">A</div>
    <div class="header-info">
      <div class="header-name" id="headerName">AI Ku</div>
      <div class="header-status"><span class="status-dot"></span>Online</div>
    </div>
    <button class="clear-btn" onclick="clearChat()">Reset</button>
  </div>

  <div id="msgs">
    <div class="empty" id="emptyState">
      <div class="empty-icon" id="emptyIcon">🤖</div>
      <div class="empty-title" id="emptyTitle">Halo! Aku AI kamu.</div>
      <div class="empty-sub">Mulai percakapan dengan mengetik pesan di bawah.</div>
    </div>
  </div>

  <div class="input-wrap">
    <div class="input-inner">
      <textarea id="inp" placeholder="Ketik pesan..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2" fill="currentColor" stroke="none"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════
//  KONFIGURASI TAMPILAN — EDIT INI
// ══════════════════════════════════════
const AI_NAME    = "AI Ku";        // nama AI
const AI_INITIAL = "A";           // huruf di avatar
const WELCOME    = "Halo! Aku AI kamu.";  // pesan welcome
// ══════════════════════════════════════

document.getElementById('headerName').textContent  = AI_NAME;
document.getElementById('headerAv').textContent    = AI_INITIAL;
document.getElementById('emptyTitle').textContent  = WELCOME;

let history = [];
const msgsEl  = document.getElementById('msgs');
const inp     = document.getElementById('inp');
const sendBtn = document.getElementById('sendBtn');

// auto resize textarea
inp.addEventListener('input', () => {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
});

inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

function clearChat() {
  history = [];
  msgsEl.innerHTML = `
    <div class="empty" id="emptyState">
      <div class="empty-icon">${AI_INITIAL}</div>
      <div class="empty-title">${WELCOME}</div>
      <div class="empty-sub">Mulai percakapan dengan mengetik pesan di bawah.</div>
    </div>`;
}

function parseMarkdown(text) {
  return text
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3 style="margin:10px 0 4px;font-size:14px;color:#fff">$1</h3>')
    .replace(/^## (.+)$/gm, '<h2 style="margin:12px 0 6px;font-size:15px;color:#fff">$1</h2>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]+?<\/li>)/g, '<ul>$1</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^(?!<[hup])(.+)$/, '<p>$1</p>');
}

function addMsg(role, text, isLoading=false) {
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const av = document.createElement('div');
  av.className = `av ${role}`;
  av.textContent = role === 'user' ? 'K' : AI_INITIAL;

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;

  if (isLoading) {
    bubble.innerHTML = '<div class="typing-wrap"><span></span><span></span><span></span></div>';
  } else {
    bubble.innerHTML = role === 'ai' ? parseMarkdown(text) : escHtml(text);
  }

  div.appendChild(av);
  div.appendChild(bubble);
  msgsEl.appendChild(div);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return bubble;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function send() {
  const text = inp.value.trim();
  if (!text || sendBtn.disabled) return;
  inp.value = ''; inp.style.height = 'auto';
  sendBtn.disabled = true;

  history.push({ role: 'user', content: text });
  addMsg('user', text);
  const loadBubble = addMsg('ai', '', true);

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    history.push({ role: 'assistant', content: data.reply });
    loadBubble.innerHTML = parseMarkdown(data.reply);
    msgsEl.scrollTop = msgsEl.scrollHeight;

  } catch(err) {
    loadBubble.innerHTML = `<span style="color:#ef4444">Error: ${err.message.slice(0,100)}</span>`;
    history.pop();
  } finally {
    sendBtn.disabled = false;
    inp.focus();
  }
}
</script>
</body>
</html>
